<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="'Arial','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <filter id="s" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="#f8f9fc" rx="12"/>

  <!-- Roof / Platform name -->
  <polygon points="60,80 500,20 940,80" fill="url(#roof)"/>
  <rect x="60" y="80" width="880" height="56" fill="#0f1629"/>
  <text x="500" y="68" text-anchor="middle" fill="white" font-size="18" font-weight="800">L4 Robotaxi 远程运营异常管理平台</text>
  <text x="500" y="58" text-anchor="middle" fill="#94a3b8" font-size="11">ROAM — RoboTaxi Operations Anomaly Management</text>
  <text x="500" y="116" text-anchor="middle" fill="white" font-size="14" font-weight="600">开源基线 · 行业共建 · 标准对齐</text>

  <!-- Four Pillars -->
  <!-- Pillar 1 -->
  <rect x="80" y="156" width="190" height="280" rx="8" fill="white" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="156" width="190" height="50" rx="8" fill="#dc2626"/>
  <rect x="80" y="190" width="190" height="16" fill="#dc2626"/>
  <text x="175" y="186" text-anchor="middle" fill="white" font-size="28">📋</text>
  <text x="175" y="228" text-anchor="middle" fill="#0f1629" font-size="15" font-weight="700">事故/异常事件库</text>
  <text x="175" y="248" text-anchor="middle" fill="#64748b" font-size="11">Incident Database</text>
  <line x1="110" y1="262" x2="240" y2="262" stroke="#f1f5f9" stroke-width="1"/>
  <text x="100" y="282" fill="#475569" font-size="11">• 16+ 结构化事件记录</text>
  <text x="100" y="300" fill="#475569" font-size="11">• YAML标准格式</text>
  <text x="100" y="318" fill="#475569" font-size="11">• 4家运营商覆盖</text>
  <text x="100" y="336" fill="#475569" font-size="11">• 社区持续更新</text>
  <text x="100" y="360" fill="#94a3b8" font-size="10">支撑安全档案(Appendix D)</text>
  <text x="100" y="376" fill="#94a3b8" font-size="10">中的运营证据要求</text>

  <!-- Pillar 2 -->
  <rect x="290" y="156" width="190" height="280" rx="8" fill="white" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="290" y="156" width="190" height="50" rx="8" fill="#ea580c"/>
  <rect x="290" y="190" width="190" height="16" fill="#ea580c"/>
  <text x="385" y="186" text-anchor="middle" fill="white" font-size="28">🏷️</text>
  <text x="385" y="228" text-anchor="middle" fill="#0f1629" font-size="15" font-weight="700">场景分类体系</text>
  <text x="385" y="248" text-anchor="middle" fill="#64748b" font-size="11">Scenario Taxonomy</text>
  <line x1="320" y1="262" x2="450" y2="262" stroke="#f1f5f9" stroke-width="1"/>
  <text x="310" y="282" fill="#475569" font-size="11">• 6大类 26子场景</text>
  <text x="310" y="300" fill="#475569" font-size="11">• 严重度S0-S4分级</text>
  <text x="310" y="318" fill="#475569" font-size="11">• 紧急度U0-U3分级</text>
  <text x="310" y="336" fill="#475569" font-size="11">• 对齐ISO 34502</text>
  <text x="310" y="360" fill="#94a3b8" font-size="10">对齐GB标准表D.1</text>
  <text x="310" y="376" fill="#94a3b8" font-size="10">整车危害分类体系</text>

  <!-- Pillar 3 -->
  <rect x="500" y="156" width="190" height="280" rx="8" fill="white" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="500" y="156" width="190" height="50" rx="8" fill="#2563eb"/>
  <rect x="500" y="190" width="190" height="16" fill="#2563eb"/>
  <text x="595" y="186" text-anchor="middle" fill="white" font-size="28">🏗️</text>
  <text x="595" y="228" text-anchor="middle" fill="#0f1629" font-size="15" font-weight="700">参考架构</text>
  <text x="595" y="248" text-anchor="middle" fill="#64748b" font-size="11">Reference Architecture</text>
  <line x1="530" y1="262" x2="660" y2="262" stroke="#f1f5f9" stroke-width="1"/>
  <text x="520" y="282" fill="#475569" font-size="11">• 三层决策模型</text>
  <text x="520" y="300" fill="#475569" font-size="11">• AI自主→人工确认→遥控</text>
  <text x="520" y="318" fill="#475569" font-size="11">• API接口规范</text>
  <text x="520" y="336" fill="#475569" font-size="11">• 场景-处置映射表</text>
  <text x="520" y="360" fill="#94a3b8" font-size="10">对齐GB标准附录C.2</text>
  <text x="520" y="376" fill="#94a3b8" font-size="10">远程协助技术要求</text>

  <!-- Pillar 4 -->
  <rect x="710" y="156" width="190" height="280" rx="8" fill="white" filter="url(#s)" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="710" y="156" width="190" height="50" rx="8" fill="#059669"/>
  <rect x="710" y="190" width="190" height="16" fill="#059669"/>
  <text x="805" y="186" text-anchor="middle" fill="white" font-size="28">📊</text>
  <text x="805" y="228" text-anchor="middle" fill="#0f1629" font-size="15" font-weight="700">评价基准</text>
  <text x="805" y="248" text-anchor="middle" fill="#64748b" font-size="11">Evaluation Benchmarks</text>
  <line x1="740" y1="262" x2="870" y2="262" stroke="#f1f5f9" stroke-width="1"/>
  <text x="730" y="282" fill="#475569" font-size="11">• 8项KPI指标定义</text>
  <text x="730" y="300" fill="#475569" font-size="11">• 自然驾驶基线数据</text>
  <text x="730" y="318" fill="#475569" font-size="11">• 目标值与基准值</text>
  <text x="730" y="336" fill="#475569" font-size="11">• 人车比经济性分析</text>
  <text x="730" y="360" fill="#94a3b8" font-size="10">支撑残余风险接受准则</text>
  <text x="730" y="376" fill="#94a3b8" font-size="10">(碰撞率&lt;10⁻⁴/h)</text>

  <!-- Foundation -->
  <rect x="60" y="450" width="880" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="472" text-anchor="middle" fill="#475569" font-size="12">基础支撑：吉林大学自动驾驶安全联合实验室（场景分类 · SOTIF方法论） ×  驭研科技（750h+航测数据 · 10.5M+轨迹基线）</text>
  <text x="500" y="490" text-anchor="middle" fill="#94a3b8" font-size="10">Jilin University AD Safety Joint Lab  ×  DRIVEResearch</text>
</svg>
